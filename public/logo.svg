<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120" role="img" aria-label="Anima-Drive logo">
  <defs>
    <linearGradient id="ad-grad-a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#7DD3B0"/>
      <stop offset="33%"  stop-color="#5FA8E8"/>
      <stop offset="66%"  stop-color="#E8B05F"/>
      <stop offset="100%" stop-color="#E87B5F"/>
    </linearGradient>
    <linearGradient id="ad-grad-b" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#E87B5F"/>
      <stop offset="50%"  stop-color="#5FA8E8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7DD3B0"/>
    </linearGradient>
    <filter id="ad-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <clipPath id="ad-clip">
      <rect x="10" y="10" width="100" height="100" rx="24"/>
    </clipPath>
  </defs>

  <rect x="10" y="10" width="100" height="100" rx="24" fill="#7DD3B0" filter="url(#ad-glow)" opacity="0.35"/>

  <g clip-path="url(#ad-clip)">
    <g>
      <rect x="-20" y="-20" width="160" height="160" fill="url(#ad-grad-a)"/>
      <rect x="-20" y="-20" width="160" height="160" fill="url(#ad-grad-b)" opacity="0.7"/>
      <animateTransform attributeName="transform" type="rotate"
        from="0 60 60" to="360 60 60" dur="14s" repeatCount="indefinite"/>
    </g>
  </g>

  <rect x="10.5" y="10.5" width="99" height="99" rx="23.5" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <rect x="18" y="18" width="84" height="84" rx="16" fill="#0e0e11"/>

  <g>
    <text x="60" y="80" font-family="ui-monospace, 'Geist Mono', 'SF Mono', Menlo, monospace"
          font-size="52" font-weight="800" fill="#fafafc" text-anchor="middle">a</text>
    <animateTransform attributeName="transform" type="rotate"
      from="0 60 60" to="-360 60 60" dur="14s" repeatCount="indefinite"/>
  </g>
</svg>
